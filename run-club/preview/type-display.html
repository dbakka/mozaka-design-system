<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../brand/css-variables.css">
<style>
  html,body{margin:0;background:#0E0B1F;color:var(--pumzi);font-family:var(--font-body);height:100%;}
  .card{padding:24px;display:flex;flex-direction:column;gap:6px;height:100%;box-sizing:border-box;overflow:hidden;}
  .label{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--dawu);margin-bottom:8px;}
  .d1{font-family:var(--font-display);font-weight:900;font-size:64px;line-height:.9;letter-spacing:-.02em;text-transform:uppercase;color:var(--pumzi);}
  .d2{font-family:var(--font-display);font-weight:800;font-size:40px;line-height:.95;letter-spacing:-.02em;text-transform:uppercase;color:var(--pumzi);}
  .d3{font-family:var(--font-display);font-weight:700;font-size:28px;line-height:1;letter-spacing:-.01em;text-transform:uppercase;color:var(--ngozi);}
  .rule{width:100%;height:1px;background:rgba(200,168,130,.15);margin:12px 0;}
  .meta{font-size:11px;color:var(--ngozi);font-family:var(--font-mono);}
</style></head>
<body><div class="card">
  <div class="label">Display — Big Shoulders Display</div>
  <div class="d1">RUN.</div>
  <div class="d1" style="color:var(--dawu)">DANCE.</div>
  <div class="d1">CHESS.</div>
  <div class="rule"></div>
  <div class="d2">Saturday 7AM</div>
  <div class="d3">Mozaka Run Club 022</div>
  <div class="rule"></div>
  <div class="meta">Weight 900 · -0.02em tracking · 0.95 line-height</div>
</div></body></html>
