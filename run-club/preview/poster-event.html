<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../brand/css-variables.css">
<style>
  html,body{margin:0;background:#0E0B1F;height:100%;overflow:hidden;}
  .poster{
    width:100%;height:100%;
    background:#0E0B1F;
    display:flex;flex-direction:column;
    justify-content:space-between;
    padding:28px 24px 24px;
    box-sizing:border-box;
    position:relative;
    overflow:hidden;
  }
  /* Background mark — large, faint */
  .bg-mark{
    position:absolute;
    right:-60px;bottom:-60px;
    opacity:.06;
    pointer-events:none;
  }
  .top{display:flex;justify-content:space-between;align-items:flex-start;}
  .eyebrow{font-family:var(--font-display);font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.14em;color:var(--dawu);}
  .mark-sm{opacity:.9;}
  .middle{flex:1;display:flex;flex-direction:column;justify-content:center;}
  .headline{
    font-family:var(--font-display);
    font-weight:900;
    font-size:clamp(52px,10vw,76px);
    line-height:.9;
    letter-spacing:-.02em;
    text-transform:uppercase;
    color:var(--pumzi);
  }
  .headline span{color:var(--dawu);}
  .headline .volt{color:var(--volt);}
  .sub{font-family:var(--font-display);font-size:16px;font-weight:700;text-transform:uppercase;letter-spacing:-.01em;color:var(--ngozi);margin-top:14px;}
  .bottom{display:flex;justify-content:space-between;align-items:flex-end;}
  .info{display:flex;flex-direction:column;gap:4px;}
  .info-line{font-size:12px;color:var(--ngozi);}
  .info-line strong{color:var(--pumzi);font-weight:500;}
  .rule{width:100%;height:1px;background:rgba(200,168,130,.15);margin:16px 0;}
  .price{font-family:var(--font-mono);font-size:14px;color:var(--volt);font-weight:700;}
</style></head>
<body>
<div class="poster">
  <!-- Background Striding Sun at large scale -->
  <svg class="bg-mark" width="320" height="320" viewBox="0 0 100 100" fill="none">
    <circle cx="50" cy="50" r="34" stroke="#E8632A" stroke-width="4"/>
    <line x1="16" y1="78" x2="84" y2="22" stroke="#E8632A" stroke-width="3" stroke-linecap="round"/>
  </svg>

  <div class="top">
    <div class="eyebrow">Mozaka Run Club · 022</div>
    <svg class="mark-sm" width="28" height="28" viewBox="0 0 100 100" fill="none">
      <circle cx="50" cy="50" r="34" stroke="#E8632A" stroke-width="5"/>
      <line x1="16" y1="78" x2="84" y2="22" stroke="#E8632A" stroke-width="4" stroke-linecap="round"/>
    </svg>
  </div>

  <div class="middle">
    <div class="headline">
      <span>Run.</span><br>
      <span>Dance.</span><br>
      <span class="volt">Chess.</span>
    </div>
    <div class="sub">Nairobi · Every Saturday · Dawn</div>
  </div>

  <div>
    <div class="rule"></div>
    <div class="bottom">
      <div class="info">
        <div class="info-line"><strong>Saturday 17 May 2026</strong></div>
        <div class="info-line">Uhuru Park Main Gate · <strong>7:00 AM</strong></div>
        <div class="info-line" style="font-size:11px;margin-top:2px;">RSVP for exact location · Ksh 500 entry</div>
      </div>
      <div class="price">KSH 500</div>
    </div>
  </div>
</div>
</body></html>
