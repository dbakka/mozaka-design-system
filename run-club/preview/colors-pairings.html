<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../brand/css-variables.css">
<style>
  html,body{margin:0;background:var(--usiku-card);color:var(--pumzi);font-family:var(--font-body);height:100%;}
  .card{padding:16px;display:flex;flex-direction:column;gap:8px;height:100%;box-sizing:border-box;}
  .row{display:flex;gap:8px;flex:1;}
  .pair{flex:1;display:flex;flex-direction:column;justify-content:space-between;padding:14px;box-sizing:border-box;}
  .pair-name{font-family:var(--font-display);font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:0.08em;opacity:.7;}
  .pair-sample{font-family:var(--font-display);font-size:18px;font-weight:900;text-transform:uppercase;letter-spacing:-0.02em;line-height:1;}
  .pair-desc{font-size:10px;opacity:.6;margin-top:4px;}
</style></head>
<body><div class="card">
  <div class="row">
    <div class="pair" style="background:#F5ECD7;color:#0E0B1F;">
      <div class="pair-name">Dawn</div>
      <div>
        <div class="pair-sample" style="color:#E8632A;">RUN<br>CLUB</div>
        <div class="pair-desc">Pumzi bg · Usiku text · Dawu CTA</div>
      </div>
    </div>
    <div class="pair" style="background:#0E0B1F;color:#F5ECD7;">
      <div class="pair-name">Night</div>
      <div>
        <div class="pair-sample" style="color:#D4F000;">SAT<br>7AM</div>
        <div class="pair-desc">Usiku bg · Pumzi text · Volt accent</div>
      </div>
    </div>
  </div>
  <div class="row">
    <div class="pair" style="background:#E8632A;color:#F5ECD7;">
      <div class="pair-name">Burst</div>
      <div>
        <div class="pair-sample" style="color:#D4F000;">FINISH<br>LINE</div>
        <div class="pair-desc">Dawu bg · Pumzi text · Volt pop</div>
      </div>
    </div>
    <div class="pair" style="background:#1E2D3E;color:#F5ECD7;">
      <div class="pair-name">Data</div>
      <div>
        <div class="pair-sample" style="font-family:monospace;color:#FFB800;font-size:20px;font-weight:700;">5:32<br>/km</div>
        <div class="pair-desc">Baridi bg · Pumzi text · Jua data</div>
      </div>
    </div>
  </div>
</div></body></html>
