<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../brand/css-variables.css">
<style>
  html,body{margin:0;background:#0E0B1F;color:var(--pumzi);font-family:var(--font-body);height:100%;}
  .card{padding:24px;display:flex;flex-direction:column;gap:20px;height:100%;box-sizing:border-box;}
  .label{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--dawu);}
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;font-family:var(--font-display);font-size:14px;font-weight:900;text-transform:uppercase;letter-spacing:-.01em;line-height:1;border:none;cursor:pointer;border-radius:2px;}
  .btn-primary{background:var(--dawu);color:var(--pumzi);}
  .btn-volt{background:var(--volt);color:var(--usiku);}
  .btn-ghost{background:transparent;color:var(--pumzi);box-shadow:inset 0 0 0 2px var(--pumzi);}
  .btn-ghost-dawu{background:transparent;color:var(--dawu);box-shadow:inset 0 0 0 2px var(--dawu);}
  .btn-sm{padding:7px 14px;font-size:12px;}
  .btn-lg{padding:14px 28px;font-size:18px;}
  .rule{height:1px;background:rgba(200,168,130,.1);}
  .section-sub{font-size:10px;color:var(--ngozi);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px;}
  .pill{display:inline-flex;align-items:center;padding:4px 12px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;border-radius:999px;}
  .pill-dawu{background:var(--dawu);color:var(--usiku);}
  .pill-volt{background:var(--volt);color:var(--usiku);}
  .pill-outline{box-shadow:inset 0 0 0 1px var(--ngozi);color:var(--ngozi);}
</style></head>
<body><div class="card">
  <div class="label">UI Components</div>

  <div>
    <div class="section-sub">Buttons</div>
    <div class="row">
      <button class="btn btn-primary">RSVP NOW</button>
      <button class="btn btn-volt">REGISTER · KSH 500</button>
      <button class="btn btn-ghost">LEARN MORE</button>
    </div>
  </div>

  <div class="rule"></div>

  <div>
    <div class="section-sub">Sizes</div>
    <div class="row">
      <button class="btn btn-primary btn-sm">SMALL</button>
      <button class="btn btn-primary">DEFAULT</button>
      <button class="btn btn-primary btn-lg">LARGE CTA</button>
    </div>
  </div>

  <div class="rule"></div>

  <div>
    <div class="section-sub">Pills & Tags</div>
    <div class="row">
      <span class="pill pill-dawu">This Saturday</span>
      <span class="pill pill-volt">7AM</span>
      <span class="pill pill-outline">5km</span>
      <span class="pill pill-outline">Nairobi</span>
    </div>
  </div>

  <div class="rule"></div>

  <div>
    <div class="section-sub">Stat Card</div>
    <div style="display:flex;gap:10px;">
      <div style="background:#1E2D3E;padding:12px 16px;display:flex;flex-direction:column;gap:2px;border-radius:2px;flex:1;">
        <div style="font-family:var(--font-mono);font-size:22px;font-weight:700;color:#FFB800;">039</div>
        <div style="font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--ngozi);">Runners</div>
      </div>
      <div style="background:#1E2D3E;padding:12px 16px;display:flex;flex-direction:column;gap:2px;border-radius:2px;flex:1;">
        <div style="font-family:var(--font-mono);font-size:22px;font-weight:700;color:#FFB800;">5:32</div>
        <div style="font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--ngozi);">Avg Pace /km</div>
      </div>
      <div style="background:#1E2D3E;padding:12px 16px;display:flex;flex-direction:column;gap:2px;border-radius:2px;flex:1;">
        <div style="font-family:var(--font-mono);font-size:22px;font-weight:700;color:#FFB800;">022</div>
        <div style="font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--ngozi);">Sessions</div>
      </div>
    </div>
  </div>

</div></body></html>
