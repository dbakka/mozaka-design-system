<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../brand/css-variables.css">
<style>
  html,body{margin:0;background:#0E0B1F;color:var(--pumzi);font-family:var(--font-body);height:100%;}
  .card{padding:24px;display:flex;flex-direction:column;gap:16px;height:100%;box-sizing:border-box;}
  .label{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--dawu);}
  .marks{display:flex;align-items:center;justify-content:space-around;flex:1;}
  .mark-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;}
  .mark-wrap svg{display:block;}
  .mark-name{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--ngozi);}
  .rule{height:1px;background:rgba(200,168,130,.1);}
  .desc{font-size:11px;color:var(--ngozi);line-height:1.5;text-align:center;padding:0 8px;}
</style></head>
<body><div class="card">
  <div class="label">The Striding Sun Mark</div>
  <div class="marks">
    <!-- Dark bg, Dawu mark -->
    <div class="mark-wrap">
      <svg width="90" height="90" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="34" stroke="#E8632A" stroke-width="4"/>
        <line x1="16" y1="78" x2="84" y2="22" stroke="#E8632A" stroke-width="3" stroke-linecap="round"/>
      </svg>
      <div class="mark-name">Dark default</div>
    </div>
    <!-- Dark bg, Volt mark -->
    <div class="mark-wrap">
      <svg width="90" height="90" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="34" stroke="#D4F000" stroke-width="4"/>
        <line x1="16" y1="78" x2="84" y2="22" stroke="#D4F000" stroke-width="3" stroke-linecap="round"/>
      </svg>
      <div class="mark-name">Volt on dark</div>
    </div>
    <!-- Light bg, Usiku mark -->
    <div class="mark-wrap" style="background:#F5ECD7;padding:16px;border-radius:4px;">
      <svg width="90" height="90" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="34" stroke="#E8632A" stroke-width="4"/>
        <line x1="16" y1="78" x2="84" y2="22" stroke="#0E0B1F" stroke-width="3" stroke-linecap="round"/>
      </svg>
      <div class="mark-name" style="color:#C8A882;">Light morning</div>
    </div>
  </div>
  <div class="rule"></div>
  <div class="desc">Circle = sun rising / chess pawn / record. Diagonal = running stride at 40°. One shape, three meanings.</div>
</div></body></html>
