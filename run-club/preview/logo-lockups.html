<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../brand/css-variables.css">
<style>
  html,body{margin:0;background:#0E0B1F;color:var(--pumzi);font-family:var(--font-body);height:100%;}
  .card{padding:24px;display:flex;flex-direction:column;gap:16px;height:100%;box-sizing:border-box;}
  .label{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--dawu);}
  .lockup{display:flex;align-items:center;gap:14px;padding:14px;flex:1;}
  .wordmark{font-family:var(--font-display);font-weight:900;text-transform:uppercase;letter-spacing:-.02em;line-height:.9;}
  .rule{height:1px;background:rgba(200,168,130,.1);}
</style></head>
<body><div class="card">
  <div class="label">Logo Lockups</div>

  <!-- Lockup 1: Dark bg, Dawu + Pumzi -->
  <div class="lockup" style="background:#0E0B1F;">
    <svg width="44" height="44" viewBox="0 0 100 100" fill="none"><circle cx="50" cy="50" r="34" stroke="#E8632A" stroke-width="4"/><line x1="16" y1="78" x2="84" y2="22" stroke="#E8632A" stroke-width="3" stroke-linecap="round"/></svg>
    <div class="wordmark" style="font-size:22px;color:#F5ECD7;">MOZAKA<br>RUN CLUB</div>
  </div>

  <div class="rule"></div>

  <!-- Lockup 2: Pumzi bg, Usiku wordmark -->
  <div class="lockup" style="background:#F5ECD7;border-radius:2px;">
    <svg width="44" height="44" viewBox="0 0 100 100" fill="none"><circle cx="50" cy="50" r="34" stroke="#E8632A" stroke-width="4"/><line x1="16" y1="78" x2="84" y2="22" stroke="#0E0B1F" stroke-width="3" stroke-linecap="round"/></svg>
    <div class="wordmark" style="font-size:22px;color:#0E0B1F;">MOZAKA<br>RUN CLUB</div>
  </div>

  <div class="rule"></div>

  <!-- Lockup 3: Dawu bg, Pumzi + Volt -->
  <div class="lockup" style="background:#E8632A;border-radius:2px;">
    <svg width="44" height="44" viewBox="0 0 100 100" fill="none"><circle cx="50" cy="50" r="34" stroke="#D4F000" stroke-width="4"/><line x1="16" y1="78" x2="84" y2="22" stroke="#D4F000" stroke-width="3" stroke-linecap="round"/></svg>
    <div class="wordmark" style="font-size:22px;color:#F5ECD7;">MOZAKA<br>RUN CLUB</div>
  </div>

  <div class="rule"></div>

  <!-- Icon only row -->
  <div style="display:flex;gap:20px;align-items:center;padding:8px 14px;">
    <svg width="28" height="28" viewBox="0 0 100 100" fill="none"><circle cx="50" cy="50" r="34" stroke="#E8632A" stroke-width="5"/><line x1="16" y1="78" x2="84" y2="22" stroke="#E8632A" stroke-width="4" stroke-linecap="round"/></svg>
    <svg width="28" height="28" viewBox="0 0 100 100" fill="none"><circle cx="50" cy="50" r="34" stroke="#D4F000" stroke-width="5"/><line x1="16" y1="78" x2="84" y2="22" stroke="#D4F000" stroke-width="4" stroke-linecap="round"/></svg>
    <svg width="28" height="28" viewBox="0 0 100 100" fill="none"><circle cx="50" cy="50" r="34" stroke="#F5ECD7" stroke-width="5"/><line x1="16" y1="78" x2="84" y2="22" stroke="#F5ECD7" stroke-width="4" stroke-linecap="round"/></svg>
    <span style="font-size:11px;color:var(--ngozi);">Solo mark — app icon, wristband, sticker, sock ankle</span>
  </div>
</div></body></html>
