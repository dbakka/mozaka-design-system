<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../brand/css-variables.css">
<style>
  html,body{margin:0;background:var(--usiku-card);color:var(--pumzi);font-family:var(--font-body);height:100%;}
  .card{padding:20px;display:flex;flex-direction:column;gap:10px;height:100%;box-sizing:border-box;}
  .row{display:flex;gap:8px;flex:1;}
  .swatch{flex:1;min-height:60px;display:flex;flex-direction:column;justify-content:space-between;padding:12px 10px;box-sizing:border-box;}
  .swatch .name{font-family:var(--font-display);font-weight:900;font-size:12px;letter-spacing:-0.01em;text-transform:uppercase;line-height:1;}
  .swatch .meta{font-size:10px;font-family:var(--font-mono);opacity:.8;display:flex;flex-direction:column;gap:1px;}
</style></head>
<body><div class="card">
  <div class="row">
    <div class="swatch" style="background:#E8632A;color:#0E0B1F;">
      <div class="name">Dawu</div>
      <div class="meta"><span>--dawu</span><span>#E8632A</span></div>
    </div>
    <div class="swatch" style="background:#0E0B1F;color:#F5ECD7;border:1px solid rgba(245,236,215,0.1);">
      <div class="name">Usiku</div>
      <div class="meta"><span>--usiku</span><span>#0E0B1F</span></div>
    </div>
    <div class="swatch" style="background:#FF3B5C;color:#0E0B1F;">
      <div class="name">Haraka</div>
      <div class="meta"><span>--haraka</span><span>#FF3B5C</span></div>
    </div>
    <div class="swatch" style="background:#FFB800;color:#0E0B1F;">
      <div class="name">Jua</div>
      <div class="meta"><span>--jua</span><span>#FFB800</span></div>
    </div>
  </div>
  <div class="row">
    <div class="swatch" style="background:#F5ECD7;color:#0E0B1F;">
      <div class="name">Pumzi</div>
      <div class="meta"><span>--pumzi</span><span>#F5ECD7</span></div>
    </div>
    <div class="swatch" style="background:#C8A882;color:#0E0B1F;">
      <div class="name">Ngozi</div>
      <div class="meta"><span>--ngozi</span><span>#C8A882</span></div>
    </div>
    <div class="swatch" style="background:#1E2D3E;color:#F5ECD7;">
      <div class="name">Baridi</div>
      <div class="meta"><span>--baridi</span><span>#1E2D3E</span></div>
    </div>
    <div class="swatch" style="background:#D4F000;color:#0E0B1F;">
      <div class="name">Volt</div>
      <div class="meta"><span>--volt</span><span>#D4F000</span></div>
    </div>
  </div>
</div></body></html>
