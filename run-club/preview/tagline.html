<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../brand/css-variables.css">
<style>
  html,body{margin:0;background:#E8632A;color:#0E0B1F;font-family:var(--font-body);height:100%;}
  .card{padding:28px;display:flex;flex-direction:column;justify-content:space-between;height:100%;box-sizing:border-box;}
  .tagline{font-family:var(--font-display);font-weight:900;font-size:52px;line-height:.9;letter-spacing:-.02em;text-transform:uppercase;}
  .tagline span{display:block;}
  .tagline .dot{color:var(--usiku);opacity:.3;}
  .phrases{display:flex;flex-direction:column;gap:6px;}
  .phrase{font-family:var(--font-display);font-weight:700;font-size:14px;text-transform:uppercase;letter-spacing:-.01em;opacity:.7;}
  .phrase.active{opacity:1;font-size:16px;}
  .label{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;opacity:.6;}
</style></head>
<body><div class="card">
  <div class="tagline">
    <span>RUN<span class="dot">.</span></span>
    <span>DANCE<span class="dot">.</span></span>
    <span>CHESS<span class="dot">.</span></span>
  </div>
  <div>
    <div class="label" style="margin-bottom:10px;">Signature phrases</div>
    <div class="phrases">
      <div class="phrase active">The best party you almost missed.</div>
      <div class="phrase">The sun is already up. Are you?</div>
      <div class="phrase">Earned at 7am.</div>
      <div class="phrase">You don't have to love running.</div>
    </div>
  </div>
</div></body></html>
