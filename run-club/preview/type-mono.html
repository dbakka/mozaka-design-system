<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../brand/css-variables.css">
<style>
  html,body{margin:0;background:#1E2D3E;color:var(--pumzi);font-family:var(--font-body);height:100%;}
  .card{padding:24px;display:flex;flex-direction:column;gap:14px;height:100%;box-sizing:border-box;}
  .label{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--dawu);}
  .stat{font-family:var(--font-mono);line-height:1.4;}
  .stat .val{font-size:32px;font-weight:700;color:var(--jua);}
  .stat .key{font-size:10px;color:var(--ngozi);text-transform:uppercase;letter-spacing:.1em;}
  .row{display:flex;gap:32px;}
  .rule{height:1px;background:rgba(200,168,130,.15);}
  .copy{font-size:12px;color:var(--ngozi);}
</style></head>
<body><div class="card">
  <div class="label">Mono — Space Mono. Data only.</div>
  <div class="row">
    <div class="stat"><div class="val">5:32</div><div class="key">pace /km</div></div>
    <div class="stat"><div class="val">5.0</div><div class="key">distance km</div></div>
    <div class="stat"><div class="val">039</div><div class="key">runners</div></div>
  </div>
  <div class="rule"></div>
  <div class="stat"><div class="val" style="font-size:22px;">SAT 17 MAY · 07:00 EAT</div><div class="key">next run club</div></div>
  <div class="rule"></div>
  <div class="copy">Space Mono is reserved for quantitative content: times, distances, paces, participant counts, dates. Never use it for prose.</div>
</div></body></html>
