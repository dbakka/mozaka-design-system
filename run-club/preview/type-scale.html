<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../brand/css-variables.css">
<style>
  html,body{margin:0;background:#0E0B1F;color:var(--pumzi);font-family:var(--font-body);height:100%;overflow:hidden;}
  .card{padding:24px;display:flex;flex-direction:column;gap:0;height:100%;box-sizing:border-box;}
  .label{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--dawu);margin-bottom:16px;}
  .row{display:flex;align-items:baseline;gap:16px;padding:8px 0;border-bottom:1px solid rgba(200,168,130,.08);}
  .tag{font-family:var(--font-mono);font-size:10px;color:var(--ngozi);width:52px;flex-shrink:0;opacity:.7;}
  .sample{font-family:var(--font-display);font-weight:900;text-transform:uppercase;letter-spacing:-.02em;line-height:1;color:var(--pumzi);}
  .size{font-family:var(--font-mono);font-size:10px;color:var(--ngozi);margin-left:auto;opacity:.5;}
</style></head>
<body><div class="card">
  <div class="label">Type Scale — Big Shoulders Display 900</div>
  <div class="row"><span class="tag">hero</span><span class="sample" style="font-size:52px">7AM NAIROBI</span><span class="size">96px</span></div>
  <div class="row"><span class="tag">h1</span><span class="sample" style="font-size:38px">Run Club 022</span><span class="size">64px</span></div>
  <div class="row"><span class="tag">h2</span><span class="sample" style="font-size:28px">Every Saturday</span><span class="size">48px</span></div>
  <div class="row"><span class="tag">h3</span><span class="sample" style="font-size:20px">Dawn at Uhuru Park</span><span class="size">32px</span></div>
  <div class="row"><span class="tag">body</span><span class="sample" style="font-family:var(--font-body);font-weight:400;font-size:14px;text-transform:none;letter-spacing:0;color:var(--ngozi)">The hardest part is lacing up. Everything after that is just running.</span><span class="size">18px</span></div>
  <div class="row"><span class="tag">mono</span><span class="sample" style="font-family:var(--font-mono);font-weight:400;font-size:13px;text-transform:none;letter-spacing:0;color:var(--jua)">5:32/km · 5.0km · 07:00</span><span class="size">16px</span></div>
  <div class="row"><span class="tag">label</span><span class="sample" style="font-family:var(--font-body);font-weight:700;font-size:11px;letter-spacing:.12em;color:var(--dawu)">MOZAKA RUN CLUB</span><span class="size">12px</span></div>
</div></body></html>
