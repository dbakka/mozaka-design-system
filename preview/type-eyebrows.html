<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0A0A0A;color:var(--bone);font-family:var(--font-body);height:100%;}
  .card{padding:24px;display:flex;flex-direction:column;gap:16px;height:100%;box-sizing:border-box;}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
  .eb{font-family:var(--font-body);font-size:12px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:#F94B0F;}
  .eb.bone{color:#F4EFE6;}
  .eb.muted{color:#6E6E6E;}
  .stamp{display:inline-block;padding:6px 10px;background:#F94B0F;color:#0A0A0A;font-family:var(--font-display);font-weight:800;font-size:13px;letter-spacing:.08em;text-transform:uppercase;}
  .stamp.outline{background:transparent;color:#F94B0F;box-shadow:inset 0 0 0 2px #F94B0F;}
  .meta{font-family:var(--font-mono);font-size:11px;color:#6E6E6E;margin-top:auto;}
</style></head>
<body><div class="card">
  <span class="eb">Eyebrow · Signal</span>
  <div class="row">
    <span class="eb">CAMP MOZAKA / 001</span>
    <span class="eb bone">RELEASED 04.21</span>
    <span class="eb muted">BTS · DAY 02</span>
  </div>
  <div class="row">
    <span class="stamp">LIVE</span>
    <span class="stamp">SOLD OUT</span>
    <span class="stamp">INNER CIRCLE</span>
    <span class="stamp outline">001</span>
  </div>
  <div class="meta">SF Pro 12 / 600 / +0.14em tracking · Stamps: Monument 13 / 800 / +0.08em</div>
</div></body></html>
