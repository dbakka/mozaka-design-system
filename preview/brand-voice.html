<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0A0A0A;color:var(--bone);font-family:var(--font-body);height:100%;}
  .card{padding:24px;display:flex;flex-direction:column;gap:12px;height:100%;box-sizing:border-box;}
  .label{font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:#F94B0F;}
  .lines{display:flex;flex-direction:column;gap:6px;}
  .l{font-family:var(--font-display);font-weight:800;font-size:22px;line-height:1.05;letter-spacing:-.015em;text-transform:uppercase;color:#F4EFE6;}
  .l.body{font-family:var(--font-body);font-weight:500;font-size:14px;text-transform:none;letter-spacing:0;color:#6E6E6E;line-height:1.45;}
  .anti{color:#4A4A4A;text-decoration:line-through;}
</style></head>
<body><div class="card">
  <div class="label">Voice — confident, mythic, founder-direct</div>
  <div class="lines">
    <div class="l">Afrohouse to the moon.</div>
    <div class="l">Built in Kampala. Played at 2am.</div>
    <div class="l">Inner Circle. By invitation.</div>
    <div class="l body">For the room after the room. For the walk home through the city.</div>
  </div>
  <div class="label" style="margin-top:8px">Avoid</div>
  <div class="lines">
    <div class="l body anti">Welcome to Mozaka! 🚀✨</div>
    <div class="l body anti">We're so excited to share our latest drop with you...</div>
    <div class="l body anti">🔥 NEW MUSIC FRIDAY 🔥</div>
  </div>
</div></body></html>
