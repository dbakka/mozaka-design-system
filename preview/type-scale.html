<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0A0A0A;color:var(--bone);font-family:var(--font-body);height:100%;}
  .card{padding:24px;display:flex;flex-direction:column;justify-content:space-between;gap:14px;height:100%;box-sizing:border-box;}
  .row{display:flex;align-items:baseline;gap:18px;}
  .row .name{font-family:var(--font-display);font-weight:700;text-transform:uppercase;color:#F4EFE6;letter-spacing:-.02em;line-height:1;}
  .row .meta{font-family:var(--font-mono);font-size:11px;color:#6E6E6E;margin-left:auto;}
  hr{border:0;border-top:1px solid #2D2D2D;margin:0;}
</style></head>
<body><div class="card">
  <div class="row"><span class="name" style="font-size:64px">H1 · NIGHT OWL</span><span class="meta">72 / .92 / -.02em / 800</span></div>
  <hr>
  <div class="row"><span class="name" style="font-size:44px">H2 · COORDINATES</span><span class="meta">52 / 1.0 / -.02em / 700</span></div>
  <hr>
  <div class="row"><span class="name" style="font-size:24px">H3 · SECTION HEAD</span><span class="meta">24 / 1.05 / -.01em / 700</span></div>
  <hr>
  <div class="row"><span class="name" style="font-size:18px">H4 · CARD HEAD</span><span class="meta">18 / 1.05 / -.01em / 600</span></div>
</div></body></html>
