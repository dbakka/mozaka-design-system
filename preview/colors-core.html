<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#1B1B1B;color:var(--bone);font-family:var(--font-body);height:100%;}
  .card{padding:24px;display:flex;flex-direction:column;gap:14px;height:100%;box-sizing:border-box;}
  .row{display:flex;gap:10px;align-items:stretch;flex-wrap:wrap;}
  .swatch{flex:1;min-width:120px;min-height:120px;display:flex;flex-direction:column;justify-content:space-between;padding:14px;box-sizing:border-box;font-family:var(--font-body);}
  .swatch .name{font-family:var(--font-display);font-weight:700;font-size:13px;letter-spacing:.04em;text-transform:uppercase;}
  .swatch .meta{font-size:11px;font-family:var(--font-mono);opacity:.85;display:flex;justify-content:space-between;}
  .void{background:#0A0A0A;color:#F4EFE6;}
  .signal{background:#F94B0F;color:#0A0A0A;}
  .concrete{background:#2D2D2D;color:#F4EFE6;}
  .bone{background:#F4EFE6;color:#0A0A0A;}
</style></head>
<body><div class="card"><div class="row">
  <div class="swatch void"><div class="name">Void Black</div><div class="meta"><span>--void-black</span><span>#0A0A0A</span></div></div>
  <div class="swatch signal"><div class="name">Signal Orange</div><div class="meta"><span>--signal-orange</span><span>#F94B0F</span></div></div>
  <div class="swatch concrete"><div class="name">Concrete Grey</div><div class="meta"><span>--concrete-grey</span><span>#2D2D2D</span></div></div>
  <div class="swatch bone"><div class="name">Bone</div><div class="meta"><span>--bone</span><span>#F4EFE6</span></div></div>
</div></div></body></html>
