<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0A0A0A;color:var(--bone);font-family:var(--font-body);height:100%;}
  .card{padding:24px;display:flex;flex-direction:column;gap:18px;height:100%;box-sizing:border-box;}
  .label{font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:#F94B0F;}
  .row{display:flex;gap:14px;align-items:center;flex-wrap:wrap;}
  .box{width:80px;height:60px;background:#1B1B1B;border:1px solid #2D2D2D;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:10px;color:#6E6E6E;}
  .pill{background:#F94B0F;color:#0A0A0A;font-family:var(--font-display);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.1em;padding:6px 14px;}
</style></head>
<body><div class="card">
  <div class="label">Radii — flat, hard, no soft corners</div>
  <div class="row">
    <div class="box" style="border-radius:0">r-0 · 0</div>
    <div class="box" style="border-radius:2px">r-1 · 2</div>
    <div class="box" style="border-radius:4px">r-2 · 4</div>
    <div class="pill" style="border-radius:999px;height:auto;width:auto">RUN CLUB · pillar pill</div>
  </div>
  <div class="label">Borders — depth via contrast</div>
  <div class="row">
    <div class="box" style="border:1px solid #4A4A4A">hairline 1px</div>
    <div class="box" style="border:2px solid #F94B0F">rule 2px</div>
    <div class="box" style="border:3px solid #F94B0F">stamp 3px</div>
  </div>
</div></body></html>
