<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0A0A0A;color:var(--bone);font-family:var(--font-body);height:100%;}
  .card{padding:24px;display:flex;flex-direction:column;justify-content:space-between;gap:18px;height:100%;box-sizing:border-box;}
  .label{font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:#F94B0F;}
  .specimen{font-family:var(--font-display);font-weight:800;text-transform:uppercase;letter-spacing:-.02em;line-height:.92;color:#F4EFE6;}
  .meta{font-family:var(--font-mono);font-size:11px;color:#6E6E6E;display:flex;gap:18px;flex-wrap:wrap;}
</style></head>
<body><div class="card">
  <div class="label">Display — Monument Extended</div>
  <div class="specimen" style="font-size:88px">AFROHOUSE<br>TO THE MOON</div>
  <div class="meta"><span>Heavy / Bold / Medium</span><span>tracking −20 → 0</span><span>line-height 0.92</span><span>uppercase</span></div>
</div></body></html>
