<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0A0A0A;color:var(--bone);font-family:var(--font-body);height:100%;}
  .card{padding:24px;display:flex;flex-direction:column;gap:8px;height:100%;box-sizing:border-box;}
  .row{display:flex;align-items:center;gap:12px;}
  .name{font-family:var(--font-mono);font-size:11px;color:#6E6E6E;width:60px;}
  .bar{height:14px;background:#F94B0F;}
  .px{font-family:var(--font-mono);font-size:11px;color:#6E6E6E;}
  .label{font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:#F94B0F;margin-bottom:6px;}
</style></head>
<body><div class="card">
  <div class="label">Spacing scale — 4px base</div>
  <div class="row"><span class="name">s-1</span><div class="bar" style="width:4px"></div><span class="px">4</span></div>
  <div class="row"><span class="name">s-2</span><div class="bar" style="width:8px"></div><span class="px">8</span></div>
  <div class="row"><span class="name">s-3</span><div class="bar" style="width:12px"></div><span class="px">12</span></div>
  <div class="row"><span class="name">s-4</span><div class="bar" style="width:16px"></div><span class="px">16</span></div>
  <div class="row"><span class="name">s-5</span><div class="bar" style="width:24px"></div><span class="px">24</span></div>
  <div class="row"><span class="name">s-6</span><div class="bar" style="width:32px"></div><span class="px">32</span></div>
  <div class="row"><span class="name">s-7</span><div class="bar" style="width:48px"></div><span class="px">48</span></div>
  <div class="row"><span class="name">s-8</span><div class="bar" style="width:64px"></div><span class="px">64</span></div>
  <div class="row"><span class="name">s-9</span><div class="bar" style="width:96px"></div><span class="px">96</span></div>
  <div class="row"><span class="name">s-10</span><div class="bar" style="width:128px"></div><span class="px">128</span></div>
</div></body></html>
