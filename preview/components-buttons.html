<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0A0A0A;color:var(--bone);font-family:var(--font-body);height:100%;}
  .card{padding:24px;display:flex;flex-direction:column;gap:14px;height:100%;box-sizing:border-box;}
  .label{font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:#F94B0F;}
  .btn{font-family:var(--font-display);font-weight:700;font-size:13px;letter-spacing:.06em;text-transform:uppercase;padding:14px 22px;border:0;cursor:pointer;background:#F94B0F;color:#0A0A0A;transition:background 180ms cubic-bezier(.2,.8,.2,1);}
  .btn:hover{background:#D43A05;}
  .btn.outline{background:transparent;color:#F4EFE6;box-shadow:inset 0 0 0 2px #F4EFE6;}
  .btn.outline:hover{box-shadow:inset 0 0 0 2px #F94B0F;color:#F94B0F;}
  .btn.ghost{background:transparent;color:#F94B0F;padding-left:0;padding-right:0;border-bottom:2px solid #F94B0F;}
  .btn:disabled{opacity:.4;cursor:not-allowed;}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
</style></head>
<body><div class="card">
  <div class="label">Buttons — flat, uppercase, Monument</div>
  <div class="row">
    <button class="btn">Listen now</button>
    <button class="btn outline">Add to wallet</button>
    <button class="btn ghost">Read playbook ↗</button>
    <button class="btn" disabled>Sold out</button>
  </div>
  <div class="label">States · Default → Hover → Press</div>
  <div class="row">
    <button class="btn">Default</button>
    <button class="btn" style="background:#D43A05">Hover</button>
    <button class="btn" style="background:#D43A05;box-shadow:inset 0 0 0 2px #0A0A0A;transform:translateY(1px)">Press</button>
  </div>
</div></body></html>
