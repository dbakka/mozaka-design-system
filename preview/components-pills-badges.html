<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0A0A0A;color:var(--bone);font-family:var(--font-body);height:100%;}
  .card{padding:24px;display:flex;flex-direction:column;gap:14px;height:100%;box-sizing:border-box;}
  .label{font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:#F94B0F;}
  .row{display:flex;gap:10px;flex-wrap:wrap;}
  .pill{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:999px;font-family:var(--font-display);font-weight:700;font-size:11px;letter-spacing:.1em;text-transform:uppercase;}
  .p1{background:#F94B0F;color:#0A0A0A}
  .p2{background:#0A0A0A;color:#F94B0F;box-shadow:inset 0 0 0 2px #F94B0F}
  .p3{background:#1B1B1B;color:#F4EFE6;box-shadow:inset 0 0 0 1px #2D2D2D}
  .p4{background:#F4EFE6;color:#0A0A0A}
  .badge{display:inline-block;padding:4px 8px;font-family:var(--font-display);font-weight:800;font-size:10px;letter-spacing:.14em;text-transform:uppercase;}
  .b1{background:#F94B0F;color:#0A0A0A}
  .b2{background:transparent;color:#F94B0F;box-shadow:inset 0 0 0 1.5px #F94B0F}
  .b3{background:#0A0A0A;color:#F4EFE6;box-shadow:inset 0 0 0 1.5px #4A4A4A}
</style></head>
<body><div class="card">
  <div class="label">Pillar pills — the only allowed pill radius</div>
  <div class="row">
    <span class="pill p1">Run Club</span>
    <span class="pill p2">Orange Pill</span>
    <span class="pill p3">Coordinates</span>
    <span class="pill p1">Mozakaville</span>
    <span class="pill p4">Camp Mozaka</span>
  </div>
  <div class="label">Status badges — flat, sharp</div>
  <div class="row">
    <span class="badge b1">LIVE</span>
    <span class="badge b1">SOLD OUT</span>
    <span class="badge b2">PRE-SALE</span>
    <span class="badge b3">ARCHIVE</span>
    <span class="badge b1">001</span>
    <span class="badge b2">2AM</span>
  </div>
</div></body></html>
