<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0A0A0A;color:var(--bone);font-family:var(--font-body);height:100%;}
  .card{display:grid;grid-template-columns:1.2fr 1fr;height:100%;}
  .swatch{position:relative;background:#0A0A0A;}
  .swatch svg{position:absolute;inset:0;width:100%;height:100%;}
  .meta{padding:24px;display:flex;flex-direction:column;gap:14px;background:#0A0A0A;}
  .label{font-size:10px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:#F94B0F;}
  .title{font-family:var(--font-display);font-weight:800;font-size:24px;line-height:.95;letter-spacing:-.02em;text-transform:uppercase;color:#F4EFE6;}
  .body{font-size:12px;line-height:1.5;color:#F4EFE6;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 14px;margin-top:auto;}
  .k{font-family:var(--font-mono);font-size:10px;color:#6E6E6E;}
  .v{font-family:var(--font-mono);font-size:10px;color:#F4EFE6;}
</style></head>
<body><div class="card">
  <div class="swatch">
    <svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
      <defs>
        <pattern id="helmet" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
          <rect width="60" height="60" fill="#0A0A0A"/>
          <!-- helmet silhouette: dome + visor band -->
          <g fill="#F94B0F">
            <path d="M30 10 C18 10 10 20 10 32 L10 42 L50 42 L50 32 C50 20 42 10 30 10 Z"/>
            <rect x="10" y="33" width="40" height="4" fill="#0A0A0A"/>
            <!-- spiral nick -->
            <circle cx="30" cy="26" r="2.5" fill="#0A0A0A"/>
          </g>
          <!-- triangle accents in negative space -->
          <path d="M0 50 L8 58 L0 58 Z" fill="#F94B0F"/>
          <path d="M60 50 L52 58 L60 58 Z" fill="#F94B0F"/>
          <path d="M26 50 L30 58 L34 50 Z" fill="#F94B0F"/>
        </pattern>
      </defs>
      <rect width="240" height="240" fill="url(#helmet)"/>
    </svg>
  </div>
  <div class="meta">
    <div class="label">Pattern · 01</div>
    <div class="title">Helmet Tile</div>
    <div class="body">Repeating helmet silhouette with triangle accents in the gutter — the most literal of the set. For shop interiors, packaging endcaps, and recap-deck section dividers.</div>
    <div class="grid">
      <span class="k">tile</span><span class="v">60 × 60</span>
      <span class="k">colorway</span><span class="v">Signal on Void</span>
      <span class="k">density</span><span class="v">full</span>
      <span class="k">use</span><span class="v">decks · packaging</span>
      <span class="k">don't</span><span class="v">behind type</span>
    </div>
  </div>
</div></body></html>
