<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0A0A0A;color:var(--bone);font-family:var(--font-body);height:100%;}
  .card{padding:24px;display:grid;grid-template-columns:1fr 1fr;gap:14px;height:100%;box-sizing:border-box;}
  .c{background:#1B1B1B;padding:18px;display:flex;flex-direction:column;gap:8px;position:relative;}
  .c.stamp{box-shadow:0 0 0 3px #F94B0F;}
  .c.bone{background:#F4EFE6;color:#0A0A0A;}
  .eb{font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:#F94B0F;}
  .eb.dk{color:#D43A05;}
  .h{font-family:var(--font-display);font-weight:700;font-size:22px;line-height:1;letter-spacing:-.02em;text-transform:uppercase;color:#F4EFE6;}
  .c.bone .h{color:#0A0A0A;}
  .body{font-size:13px;color:#6E6E6E;line-height:1.45;}
  .c.bone .body{color:#2D2D2D;}
  .meta{margin-top:auto;font-family:var(--font-mono);font-size:10px;color:#6E6E6E;}
</style></head>
<body><div class="card">
  <div class="c"><span class="eb">Coordinates / 001</span><div class="h">Nairobi<br>11.07.26</div><div class="body">Doors 22:00 · 21+</div><span class="meta">DEFAULT · #1B1B1B</span></div>
  <div class="c stamp"><span class="eb">Coordinates / 002</span><div class="h">Kampala<br>02.08.26</div><div class="body">Inner Circle pre-sale</div><span class="meta">STAMP · 3px Signal</span></div>
  <div class="c bone"><span class="eb dk">Camp Mozaka / 001</span><div class="h">Six artists.<br>One room.<br>Five days.</div><span class="meta">BONE SURFACE · print</span></div>
  <div class="c" style="background:#F94B0F;color:#0A0A0A"><span class="eb" style="color:#0A0A0A">Inner Circle</span><div class="h" style="color:#0A0A0A">By invitation.</div><div class="body" style="color:#0A0A0A">Membership #017 / 250</div><span class="meta" style="color:#0A0A0A">SIGNAL FILL · poster</span></div>
</div></body></html>
