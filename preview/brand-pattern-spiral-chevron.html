<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0A0A0A;color:var(--bone);font-family:var(--font-body);height:100%;}
  .card{display:grid;grid-template-columns:1.2fr 1fr;height:100%;}
  .swatch{position:relative;background:#F94B0F;}
  .swatch svg{position:absolute;inset:0;width:100%;height:100%;}
  .meta{padding:24px;display:flex;flex-direction:column;gap:14px;background:#0A0A0A;}
  .label{font-size:10px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:#F94B0F;}
  .title{font-family:var(--font-display);font-weight:800;font-size:24px;line-height:.95;letter-spacing:-.02em;text-transform:uppercase;color:#F4EFE6;}
  .body{font-size:12px;line-height:1.5;color:#F4EFE6;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 14px;margin-top:auto;}
  .k{font-family:var(--font-mono);font-size:10px;color:#6E6E6E;}
  .v{font-family:var(--font-mono);font-size:10px;color:#F4EFE6;}
</style></head>
<body><div class="card">
  <div class="swatch">
    <svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
      <defs>
        <pattern id="spch" x="0" y="0" width="80" height="40" patternUnits="userSpaceOnUse">
          <rect width="80" height="40" fill="#F94B0F"/>
          <!-- chevron stripes (Ndebele) -->
          <path d="M0 0 L20 0 L0 20 Z" fill="#0A0A0A"/>
          <path d="M40 0 L60 0 L40 20 Z" fill="#0A0A0A"/>
          <path d="M0 40 L20 40 L0 20 Z" fill="#0A0A0A"/>
          <path d="M40 40 L60 40 L40 20 Z" fill="#0A0A0A"/>
          <!-- spiral nodes (helmet crest motif) -->
          <circle cx="30" cy="20" r="4" fill="#0A0A0A"/>
          <circle cx="30" cy="20" r="2" fill="#F94B0F"/>
          <circle cx="70" cy="20" r="4" fill="#0A0A0A"/>
          <circle cx="70" cy="20" r="2" fill="#F94B0F"/>
        </pattern>
      </defs>
      <rect width="240" height="240" fill="url(#spch)"/>
    </svg>
  </div>
  <div class="meta">
    <div class="label">Pattern · 02</div>
    <div class="title">Spiral Chevron</div>
    <div class="body">Ndebele chevron rhythm with spiral nodes from the helmet crest sitting in the gutters. Reads as a band — best as a stripe on a tee hem, hat side, or poster footer.</div>
    <div class="grid">
      <span class="k">tile</span><span class="v">80 × 40</span>
      <span class="k">colorway</span><span class="v">Void on Signal</span>
      <span class="k">density</span><span class="v">full · band</span>
      <span class="k">use</span><span class="v">apparel · footer bands</span>
      <span class="k">don't</span><span class="v">tile a whole flyer</span>
    </div>
  </div>
</div></body></html>
